global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: "rust-dataplane"
    static_configs:
      - targets: ["rust-dataplane:9090"]
    metrics_path: /metrics

  - job_name: "python-controlplane"
    static_configs:
      - targets: ["python-controlplane:8000"]
    metrics_path: /api/metrics/prometheus

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
