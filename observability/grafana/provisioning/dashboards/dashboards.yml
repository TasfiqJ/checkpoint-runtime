apiVersion: 1

providers:
  - name: 'checkpoint-runtime'
    orgId: 1
    folder: 'Checkpoint Runtime'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
