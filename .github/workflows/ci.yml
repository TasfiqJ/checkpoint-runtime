name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-dataplane

      - name: Check formatting
        working-directory: rust-dataplane
        run: cargo fmt --check || true

      - name: Clippy
        working-directory: rust-dataplane
        run: cargo clippy --lib --bins -- -D warnings || true

      - name: Unit tests
        working-directory: rust-dataplane
        run: cargo test --lib

  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python-controlplane
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]" || pip install -e .

      - name: Ruff lint
        working-directory: python-controlplane
        run: ruff check src/ tests/ || true

      - name: Mypy
        working-directory: python-controlplane
        run: mypy src/ --ignore-missing-imports || true

      - name: Pytest
        working-directory: python-controlplane
        run: PYTHONPATH=src python -m pytest tests/ -v --tb=short

  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --ext .ts,.tsx || true

      - name: Build
        working-directory: frontend
        run: npm run build || true
