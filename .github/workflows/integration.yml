name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Python control plane
        run: docker compose build python-controlplane

      - name: Build frontend
        run: docker compose build frontend

      - name: Build Rust data plane
        run: docker compose build rust-dataplane || true

      - name: Build training workers
        run: docker compose build training-worker-0 || true

      - name: Start stack
        run: docker compose up -d --wait --wait-timeout 60 || docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          sleep 20
          docker compose ps

      - name: Check service health
        run: |
          # Retry health check up to 5 times
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8000/api/health; then
              echo "Control plane healthy"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 5
          done
          echo "Health check failed — showing logs"
          docker compose logs python-controlplane --tail=30
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
