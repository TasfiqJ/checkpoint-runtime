name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Python control plane
        run: docker compose build python-controlplane

      - name: Build frontend
        run: docker compose build frontend

      - name: Build Rust data plane
        run: docker compose build rust-dataplane || true

      - name: Build training workers
        run: docker compose build training-worker-0 || true

      - name: Start core services
        run: docker compose up -d etcd minio python-controlplane frontend

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          sleep 15
          docker compose ps

      - name: Check service health
        run: |
          curl -f http://localhost:8000/api/health || exit 1
          echo "Control plane healthy"

      - name: Tear down
        if: always()
        run: docker compose down -v
