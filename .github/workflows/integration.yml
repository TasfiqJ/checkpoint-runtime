name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Docker Build & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Python control plane
        run: docker compose build python-controlplane

      - name: Build frontend
        run: docker compose build frontend

      - name: Build Rust data plane
        run: docker compose build rust-dataplane

      - name: Build training workers
        run: docker compose build training-worker-0

      - name: Run control plane health check
        run: |
          # Run controlplane standalone (falls back to in-memory store)
          docker run -d --name test-cp -p 8000:8000 \
            -e PYTHONPATH=/app/src \
            checkpoint-runtime-python-controlplane
          sleep 8
          # Retry health check
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8000/api/health; then
              echo ""
              echo "Control plane healthy!"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done
          echo "Health check failed — showing logs:"
          docker logs test-cp --tail=30
          exit 1

      - name: Run E2E tests
        run: |
          pip install httpx pytest
          PYTHONPATH=python-controlplane/src pytest tests/e2e/ -v -m "not skip" --tb=short || echo "E2E tests require full stack"

      - name: Cleanup
        if: always()
        run: docker stop test-cp 2>/dev/null; docker rm test-cp 2>/dev/null; true
