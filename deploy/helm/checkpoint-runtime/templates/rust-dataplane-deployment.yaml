apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rust-dataplane
  labels:
    app: rust-dataplane
    component: data-plane
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app: rust-dataplane
  template:
    metadata:
      labels:
        app: rust-dataplane
        component: data-plane
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: dataplane
          image: "{{ .Values.rustDataplane.image.repository }}:{{ .Values.rustDataplane.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: S3_ENDPOINT
              value: {{ .Values.rustDataplane.env.S3_ENDPOINT | quote }}
            - name: S3_BUCKET
              value: {{ .Values.rustDataplane.env.S3_BUCKET | quote }}
            - name: S3_ACCESS_KEY
              value: {{ .Values.rustDataplane.env.S3_ACCESS_KEY | quote }}
            - name: S3_SECRET_KEY
              value: {{ .Values.rustDataplane.env.S3_SECRET_KEY | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "rust-dataplane"
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
          resources:
            {{- toYaml .Values.rustDataplane.resources | nindent 12 }}
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rust-dataplane
  labels:
    app: rust-dataplane
    component: data-plane
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    app: rust-dataplane
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9090
      targetPort: 9090
