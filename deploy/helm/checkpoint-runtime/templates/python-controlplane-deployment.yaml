apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-controlplane
  labels:
    app: python-controlplane
    component: control-plane
spec:
  replicas: {{ .Values.pythonControlplane.replicaCount }}
  selector:
    matchLabels:
      app: python-controlplane
  template:
    metadata:
      labels:
        app: python-controlplane
        component: control-plane
    spec:
      containers:
        - name: controlplane
          image: "{{ .Values.pythonControlplane.image.repository }}:{{ .Values.pythonControlplane.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 50052
              name: grpc
          env:
            - name: DATAPLANE_GRPC_URL
              value: "rust-dataplane:50051"
            - name: ETCD_HOST
              value: "etcd"
            - name: ETCD_PORT
              value: "2379"
          resources:
            {{- toYaml .Values.pythonControlplane.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: python-controlplane
spec:
  selector:
    app: python-controlplane
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 50052
      targetPort: 50052
